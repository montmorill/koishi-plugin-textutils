commands:
  shuf:
    description: generate random permutation
    options:
      count: output at most COUNT lines
  wc:
    description: print newline, word, and byte counts
    options:
      bytes: print the byte counts
      chars: print the character counts
      lines: print the newline counts
      words: print the word counts
  uniq:
    description: report or omit repeated lines
    options:
      repeated: only print duplicate lines, one for each group
      unique: only print unique lines
      count: prefix lines by the number of occurrences
  sort:
    description: sort lines of text
    options:
      reverse: reverse the result of comparisons
  grep:
    description: print lines that match pattern
    options:
      invert: Invert the sense of matching, to select non-matching lines.
      color: Display the matched strings with special color.
    messages:
      colored: <strong>{0}</strong>
      no-needle: No needle provided.
      no-haystack: No haystack provided.
  sed:
    description: replace strings in lines of text
    options:
      global: Global replace
    messages:
      no-regexp: No regexp provided.
      no-replacement: No replacement provided.
